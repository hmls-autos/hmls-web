name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache bun dependencies for web apps
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('apps/hmls-web/bun.lock', 'apps/fixo-web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install hmls-web dependencies
        run: cd apps/hmls-web && bun install --frozen-lockfile

      - name: Lint (hmls-web)
        run: cd apps/hmls-web && bun run lint

      - name: Type Check (hmls-web)
        run: cd apps/hmls-web && bun run typecheck

      - name: Build (hmls-web)
        run: cd apps/hmls-web && bun run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Install fixo-web dependencies
        run: cd apps/fixo-web && bun install --frozen-lockfile

      - name: Lint (fixo-web)
        run: cd apps/fixo-web && bun run lint

      - name: Type Check (fixo-web)
        run: cd apps/fixo-web && bun run typecheck

      - name: Build (fixo-web)
        run: cd apps/fixo-web && bun run build --webpack
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Lint (deno)
        run: deno task lint

      - name: Format Check (deno)
        run: deno task fmt:check

      - name: Check API
        run: deno task check
